  }
  button.tap:active { transform:scale(.93); }
  button.tap:disabled { opacity:.35; box-shadow:none; }

  .yi { font-size:11px; color:#8a7a5f; margin-top:3px; line-height:1.5; }

  const TYPES = {
    '谋事':{mode:'生克', tip:'看体用生克+本互变走势。用生体/比和→顺,用克体→受阻。'},
    '求财':{mode:'生克', tip:'体=你,用=财。用生体/比和→得财,体克用→可得但费力,用克体→难得。'},
    '姻缘':{mode:'感情', tip:'体=你,用=对方/感情。用生体/比和→合得来能成,用克体→对方压你,体生用→你付出多。合卦:咸恒既济泰;离卦:睽否剥。'},
    '事业':{mode:'生克', tip:'体=你,用=工作/事业。用生体/比和→顺、能得,用克体→受阻;离(文书)、乾(权位)为佳。'},
    '考试':{mode:'生克', tip:'体=考生,用=考试/功名。用生体/比和→顺利,用克体→较难;离(文书)旺利考。'},
    '出行':{mode:'生克', tip:'体=出行人,用=行程。用生体/比和→顺利平安,用克体→有阻;坎(险)、震(动荡)宜谨慎。'},
    '官司':{mode:'生克', tip:'体=你,用=对方/官非。用克体→不利,体克用→占上风但费力,比和/用生体→易和解。'},
    '疾病':{mode:'生克', tip:'体=病人,用=病。用生体→病轻/好转,用克体→较重需谨慎。⚠️健康以就医为准,卦仅参考。'},
    '天气':{mode:'天气', tip:'看卦里自然象:坎=雨、乾离=晴、震=雷、巽=风、坤=阴、兑=小雨、艮=云雾转变。'},
    '失物':{mode:'方位', tip:'用卦=失物,其方位=物可能所在方向,类象=物的特征。'},
    '寻人':{mode:'方位', tip:'用卦=所寻之人,方位=可能方向,类象=人的特征(乾=老人/男、兑=少女、坎=中男…)。'}
  };
  let qType = '谋事';

  let taps = []; // 每下 0/1
  let lastPrompt = '';

  const $ = id => document.getElementById(id);

  function triName(b) { return TRI[b.join('')]; }
  // 六爻 bits: index0=初爻(下), index5=上爻(顶)
  function guaName(bits) {
    const lower = triName(bits.slice(0,3));   // 下卦=初二三爻
    const upper = triName(bits.slice(3,6));   // 上卦=四五六爻
    return { name: GUA64[upper+lower], upper, lower };
  }
  function hexHTML(bits, moving) { // bits:0/1/-1(空); moving:1-6 或 0
    let h = '<div class="hex">';
    for (let i=5; i>=0; i--) {   // 上爻→初爻,自上而下画
      const v = bits[i];
      if (v === -1) { h += '<div class="yao empty"><div class="bar"></div></div>'; continue; }
      const yang = v===1;
      const mv = moving && (i+1)===moving ? ' moving' : '';
      h += `<div class="yao ${yang?'yang':'yin'}${mv}">`;
      h += yang ? '<div class="bar"></div>' : '<div class="bar"></div><div class="bar"></div>';
      h += '</div>';
    }
    return h + '</div>';
  }
  function card(role, bits, moving) {
    const g = guaName(bits);
    return `<div class="card ${role.indexOf('本卦')===0?'ben':''}">
      ${hexHTML(bits, moving)}
      <div class="card-info">
        <div class="role">${role}</div>
        <div class="gname">${g.name}</div>
        <div class="tri">上 ${g.upper}${SYM[g.upper]}·${NAT[g.upper]}(${WX[g.upper]})　下 ${g.lower}${SYM[g.lower]}·${NAT[g.lower]}(${WX[g.lower]})</div>
        <div class="baihua">💬 ${BAIHUA[g.name]||''}</div>
        <div class="yi">${GUAYI[g.name]||''}</div>
      </div></div>`;
  }
  function analysisHTML(qt, d) {
    const cfg = TYPES[qt];
    let inner = '';
    if (cfg.mode === '生克') {
      const 体标签 = qt==='疾病' ? '体卦(病人)' : '体卦(你自己)';
      inner =
        `<div class="jie-row"><span>${体标签}</span><b>${d.体位} ${d.体名}${SYM[d.体名]} · ${WX[d.体名]}</b></div>` +
        `<div class="jie-lx">${d.体名}的类象:${LEIXIANG[d.体名]}</div>` +
        `<div class="jie-row"><span>用卦(所问)</span><b>${d.用位} ${d.用名}${SYM[d.用名]} · ${WX[d.用名]}</b></div>` +
        `<div class="jie-lx">${d.用名}的类象:${LEIXIANG[d.用名]}</div>` +
        `<div class="jie-verdict ${d.rel.c}">${d.rel.t} → ${d.rel.j}</div>` +
        `<div class="jie-desc">${d.rel.d}</div>` +
        wangShuaiHTML(d.体名);
    } else if (cfg.mode === '感情') {
      const 合 = ['泽山咸','雷风恒','水火既济','地天泰','风泽中孚','风火家人'];
      const 离 = ['火泽睽','天地否','山地剥','水山蹇','泽风大过','雷泽归妹'];
      const jg = GUA64[triName(d.bianBits.slice(3,6))+triName(d.bianBits.slice(0,3))];
      let hl;
      if (合.indexOf(jg) >= 0) hl = `<div class="jie-verdict good">结果卦「${jg}」偏"合" → 利在一起</div>`;
      else if (离.indexOf(jg) >= 0) hl = `<div class="jie-verdict bad">结果卦「${jg}」偏"离" → 悬,须用心经营</div>`;
      else hl = `<div class="jie-lx">结果卦「${jg}」非明显合/离,结合卦意自己判断</div>`;
      inner =
        `<div class="jie-row"><span>体卦(你自己)</span><b>${d.体位} ${d.体名}${SYM[d.体名]} · ${WX[d.体名]}</b></div>` +
        `<div class="jie-lx">${d.体名}的类象:${LEIXIANG[d.体名]}</div>` +
        `<div class="jie-row"><span>用卦(对方/感情)</span><b>${d.用位} ${d.用名}${SYM[d.用名]} · ${WX[d.用名]}</b></div>` +
        `<div class="jie-lx">${d.用名}的类象:${LEIXIANG[d.用名]}</div>` +
        `<div class="jie-verdict ${d.rel.c}">${d.rel.t} → ${d.rel.j}</div>` +
        `<div class="jie-desc">${d.rel.d}</div>` + wangShuaiHTML(d.体名) + hl;
    } else if (cfg.mode === '天气') {
      const rows = [['本卦(现状)',d.benBits],['互卦(过程)',d.huBits],['变卦(结果)',d.bianBits]].map(function(x){
        const b=x[1], t1=triName(b.slice(0,3)), t2=triName(b.slice(3,6));
        return `<div class="jie-row"><span>${x[0]}</span><b>上${t2}=${TIANQI[t2]}　下${t1}=${TIANQI[t1]}</b></div>`;
      }).join('');
      const all = [triName(d.benBits.slice(0,3)),triName(d.benBits.slice(3,6)),triName(d.bianBits.slice(0,3)),triName(d.bianBits.slice(3,6))];
      let sum;
      if (all.indexOf('坎')>=0) sum='卦中有坎(水/雨)→ 偏有雨';
      else if (all.indexOf('震')>=0) sum='卦中有震(雷)→ 可能雷阵雨';
      else if (all.indexOf('兑')>=0 || all.indexOf('坤')>=0) sum='有兑/坤(阴)→ 多云转阴,或飘小雨';
      else sum='多为乾离(晴/天)'+(all.indexOf('巽')>=0?'+巽(风)':'')+' → 以晴为主'+(all.indexOf('艮')>=0?',或有转变':'');
      inner = rows + `<div class="jie-verdict good">综合(重现状+结果):${sum}</div>`;
    } else if (cfg.mode === '方位') {
      inner =
        `<div class="jie-row"><span>失物(用卦)</span><b>${d.用名}${SYM[d.用名]} · ${WX[d.用名]}</b></div>` +
        `<div class="jie-verdict good">可能方位:${FANGWEI[d.用名]}方</div>` +
        `<div class="jie-lx">物的特征(类象):${LEIXIANG[d.用名]}</div>`;
    }
    return `<div class="jie"><div class="jie-title">解卦 · ${qt}</div>${inner}<div class="jie-desc" style="margin-top:8px;color:#7a6b52">${cfg.tip}</div></div>`;
  }

  function render() {
    $('progress').textContent = '第 ' + taps.length + ' / 9 下';

    // ---- 起卦中的本卦柱 ----
    // 前3下=上卦(四五六爻), 中3下=下卦(初二三爻);第 i 下 → 本卦爻位置
    const posMap = [3,4,5,0,1,2];
    const partial = [-1,-1,-1,-1,-1,-1];
    for (let i=0; i<Math.min(taps.length,6); i++) partial[posMap[i]] = taps[i];
    let build = hexHTML(partial, 0);
    // 动爻构建提示(第7-9下)
    let dong = '';
    if (taps.length >= 6) {
      const dtaps = taps.slice(6,9);
      dong = '<div class="dong-build">动爻:' + (dtaps.length? dtaps.join(' ') : '_ _ _') + '</div>';
    }
    $('building').innerHTML = build + dong;

    // ---- 满9下:出结果 ----
    if (taps.length >= 9) {
      // 本卦:前3下=上卦, 中3下=下卦(自下而上排:下卦=初二三, 上卦=四五六)
      const benBits = [ taps[3],taps[4],taps[5], taps[0],taps[1],taps[2] ];
      const n = taps[6]*4 + taps[7]*2 + taps[8]; // 0-7
      showResult(benBits, (n % 6) || 6);
      $('tapBtn').disabled = true;
    } else {
      $('result').innerHTML = '';
      $('tapBtn').disabled = false;
    }
  }

  // 根据本卦六爻 + 动爻,渲染 本/互/变 三卦(点卦、报数共用)
  function showResult(benBits, dongYao) {
    const bianBits = benBits.slice();
    bianBits[dongYao-1] = benBits[dongYao-1] ? 0 : 1; // 翻动爻
    const huBits = [ benBits[1],benBits[2],benBits[3], benBits[2],benBits[3],benBits[4] ];
    let 用bits, 体bits, 用位, 体位;
    if (dongYao <= 3) { 用bits=benBits.slice(0,3); 体bits=benBits.slice(3,6); 用位='下卦'; 体位='上卦'; }
    else              { 用bits=benBits.slice(3,6); 体bits=benBits.slice(0,3); 用位='上卦'; 体位='下卦'; }
    const 用名=triName(用bits), 体名=triName(体bits);
    const rel = relation(WX[用名], WX[体名]);
    const jie = analysisHTML(qType, {benBits, huBits, bianBits, dong爻:dongYao, 用名, 体名, 用位, 体位, rel});
    // 拼一段可复制的解卦提示词(粘到 DeepSeek/任意AI)
    const g本 = guaName(benBits).name, g互 = guaName(huBits).name, g变 = guaName(bianBits).name;
    const ling = dangLing(), ws = wangShuai(WX[体名], ling), 季 = {'木':'春','火':'夏','金':'秋','水':'冬'}[ling];
    lastPrompt =
      `我用梅花易数起了一卦,问的是【${qType}】。请用大白话,结合下面信息给我一段自然连贯的解读(300字内,像聊天别罗列),最后给一句建议。\n\n` +
      `体用生克:体卦${体名}(我自己)、用卦${用名}(所问) —— ${rel.t},${rel.j}(${rel.d})。\n` +
      `当令旺衰:${季}季${ling}旺,体卦${体名}现【${ws}】。\n\n` +
      `本卦(现状):${g本} —— ${BAIHUA[g本]}\n` +
      `互卦(过程):${g互} —— ${BAIHUA[g互]}\n` +
      `变卦(结果):${g变} —— ${BAIHUA[g变]}\n` +
      `动爻:第${dongYao}爻。\n\n` +
      `请解读现状→过程→结果怎么走,对我这个【${qType}】问题意味着什么,给一段话+一句建议。`;
    $('result').innerHTML =
      `<div class="dong-info">动爻:第 ${dongYao} 爻</div>` + jie +
      card('本卦(现状)', benBits, dongYao) +
      card('互卦(过程)', huBits, 0) +
      card('变卦(结果)', bianBits, 0) +
      `<button class="copybtn" onclick="copyPrompt()">📋 复制解卦提示词 → 粘到 DeepSeek</button>` +
      `<div class="disclaim">以上为初步倾向,仅供参考。真正断卦还要结合卦象象意、旺衰和所问之事——请顺着「本→互→变」三卦的卦意,自己综合判断。</div>`;
  }
  function copyPrompt() {
    if (!lastPrompt) return;
    const ta = document.createElement('textarea');
    ta.value = lastPrompt;
    ta.style.position='fixed'; ta.style.top='0'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    let ok=false; try { ok = document.execCommand('copy'); } catch(e){}
    document.body.removeChild(ta);
    alert(ok ? '已复制!打开 DeepSeek 粘贴,让它帮你解读~' : '复制失败,请长按结果手动复制');
  }

  // 报数起卦:第1数=上卦,第2数=下卦(÷8取余,先天数),动爻=(两数和)÷6;若给3个数则第3数÷6定动爻
  function castByNumbers(str) {
    const nums = (str||'').split(/[^0-9]+/).filter(x=>x!=='').map(Number);
    if (nums.length < 2) { alert('请输入2个数(上卦、下卦),或3个数(第3个定动爻)'); return; }
    const 先天 = {1:'111',2:'110',3:'101',4:'100',5:'011',6:'010',7:'001',8:'000'};
    const trig = x => { let r = x % 8; if (r===0) r=8; return 先天[r].split('').map(Number); };
    const 上 = trig(nums[0]);
    const 下 = trig(nums[1]);
    const benBits = [下[0],下[1],下[2], 上[0],上[1],上[2]]; // 下卦=初二三,上卦=四五六
    const dong = nums.length>=3 ? ((nums[2]%6)||6) : (((nums[0]+nums[1]+shichenNum())%6)||6); // 2数:加时辰
    taps = [];
    $('building').innerHTML = '';
    $('progress').textContent = '报数起卦:' + nums.slice(0, nums.length>=3?3:2).join(' ');
    $('tapBtn').disabled = true;
    showResult(benBits, dong);
  }
  $('tapBtn').addEventListener('click', () => {
    if (taps.length >= 9) return;
    taps.push(Math.random() < 0.5 ? 0 : 1);
    render();
  });
  $('numBtn').addEventListener('click', () => castByNumbers($('numInput').value));
  $('resetBtn').addEventListener('click', () => { taps = []; $('numInput').value = ''; render(); });

  function buildTypes() {
    $('types').innerHTML = Object.keys(TYPES).map(t =>
      `<button class="${t===qType?'on':''}" data-t="${t}">${t}</button>`).join('');
    $('types').querySelectorAll('button').forEach(b =>
      b.onclick = () => { qType = b.dataset.t; buildTypes(); render(); });
  }
  buildTypes();
  render();
</script>
</body>
</html>
