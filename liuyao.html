  const DIZHI=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const DZ_WX={'子':'水','丑':'土','寅':'木','卯':'木','辰':'土','巳':'火','午':'火','未':'土','申':'金','酉':'金','戌':'土','亥':'水'};
  const TG=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  // 纳甲纳支:每经卦 内(初二三) / 外(四五六)
  const NAZHI={
    '乾':{i:['子','寅','辰'],o:['午','申','戌']},
    '坎':{i:['寅','辰','午'],o:['申','戌','子']},
    '艮':{i:['辰','午','申'],o:['戌','子','寅']},
    '震':{i:['子','寅','辰'],o:['午','申','戌']},
    '巽':{i:['丑','亥','酉'],o:['未','巳','卯']},
    '离':{i:['卯','丑','亥'],o:['酉','未','巳']},
    '坤':{i:['未','巳','卯'],o:['丑','亥','酉']},
    '兑':{i:['巳','卯','丑'],o:['亥','酉','未']}
  };
  const SHENG={'金':'水','水':'木','木':'火','火':'土','土':'金'};
  const KE   ={'金':'木','木':'土','土':'水','水':'火','火':'金'};
  const LIUSHEN=['青龙','朱雀','勾陈','螣蛇','白虎','玄武'];
  // 京房八宫:宫五行 + 每卦世爻位(初=1…上=6)
  const GONG={};
  [['金',['乾为天','天风姤','天山遁','天地否','风地观','山地剥','火地晋','火天大有']],
   ['水',['坎为水','水泽节','水雷屯','水火既济','泽火革','雷火丰','地火明夷','地水师']],
   ['土',['艮为山','山火贲','山天大畜','山泽损','火泽睽','天泽履','风泽中孚','风山渐']],
   ['木',['震为雷','雷地豫','雷水解','雷风恒','地风升','水风井','泽风大过','泽雷随']],
   ['木',['巽为风','风天小畜','风火家人','风雷益','天雷无妄','火雷噬嗑','山雷颐','山风蛊']],
   ['火',['离为火','火山旅','火风鼎','火水未济','山水蒙','风水涣','天水讼','天火同人']],

  let qType='综合';
  let gender='女'; // 婚姻:女测看官鬼(他)、男测看妻财(她)
  function effYong(){ return qType==='婚姻' ? (gender==='女'?'官鬼':'妻财') : YONGSHEN[qType].lq; }
  function yongToShiLove(u,s){
    if(u===s) return '用神与世同气 —— 气场相投、地位相当,处得来';
    if(SHENG[u]===s) return '💚 用神生世 —— 对方向着你、对你有心/愿付出(偏有意)';
    if(KE[u]===s)    return '⚠ 用神克世 —— 对方强势/对你有意见或压力(偏不利)';

  /* ===== 卦逻辑 ===== */
  function triName(bits){ return TRI[bits.join('')]; }
  function guaInfo(bits){ // bits: 初..上 (index0=初爻)
    const lower=triName(bits.slice(0,3)), upper=triName(bits.slice(3,6));
    return { name:GUA64[upper+lower], upper, lower };
  }
  function naZhi(bits){ // 返回 pos1..6 地支
    const lower=triName(bits.slice(0,3)), upper=triName(bits.slice(3,6));
    const li=NAZHI[lower].i, uo=NAZHI[upper].o;
    return [li[0],li[1],li[2],uo[0],uo[1],uo[2]];
  }
  function liuqin(gongWX, yaoWX){ // 以宫五行为"我"
    if(yaoWX===gongWX) return '兄弟';
    if(SHENG[yaoWX]===gongWX) return '父母'; // 生我
    if(SHENG[gongWX]===yaoWX) return '子孙'; // 我生
    if(KE[gongWX]===yaoWX)    return '妻财'; // 我克
    if(KE[yaoWX]===gongWX)    return '官鬼'; // 克我
    return '';
  }
  function liushenStart(ganIdx){ return [0,0,1,1,2,3,4,4,5,5][ganIdx]; }
  function dayGZ(){
    const anchor=Date.UTC(2000,0,7); // 2000-01-07 = 甲子日
    const now=new Date();
    const today=Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
    const days=Math.round((today-anchor)/86400000);
    return ((days%60)+60)%60; // 0=甲子
  }
  function xunKong(gz){
    const head=gz-(gz%10), hz=head%12;
    return [DIZHI[(hz+10)%12], DIZHI[(hz+11)%12]];
  }
  function shake(){
    let b=0; const coins=[];
    for(let i=0;i<3;i++){ const c=Math.random()<0.5?1:0; coins.push(c); b+=c; } // 1=背(阳面)
    return { b, coins, yang:(b%2===1), moving:(b===0||b===3) };
  }

  /* ===== 渲染 ===== */
  function coinsHTML(coins){
    return '<div class="coins">'+coins.map(c=>`<span class="coin ${c? 'bei':'zi'}"></span>`).join('')+'</div>';
  }
  function render(){
    $('progress').textContent='第 '+yaos.length+' / 6 爻';
    // 摇卦中:上爻→初爻
    let b='';
    for(let i=5;i>=0;i--){
      if(i<yaos.length){
        const y=yaos[i];
        b+=`<div class="brow">${coinsHTML(y.coins)}<span class="bar ${y.moving?'mv':''}">${barText(y.yang)}</span><span class="bname">${yaoLabel(y)}${moveSym(y)}</span></div>`;
      } else {
        b+=`<div class="brow empty"><div class="coins"></div><span class="bar">▬▬ ▬ ▬▬</span><span class="bname">—</span></div>`;
      }
    }
    $('building').innerHTML=b;
    if(yaos.length>=6){ showResult(); $('tapBtn').disabled=true; $('autoBtn').style.display='none'; }
    else { $('result').innerHTML=''; $('tapBtn').disabled=false; $('autoBtn').style.display=''; }
  }

  function showResult(){
    const benBits =yaos.map(y=>y.yang?1:0);
    const bianBits=yaos.map(y=>y.moving?(y.yang?0:1):(y.yang?1:0));
    const ben=guaInfo(benBits), bian=guaInfo(bianBits);
    const info=GONG[ben.name]; const gongWX=info.g, shi=info.shi, ying=shi<=3?shi+3:shi-3;
    const benZhi=naZhi(benBits), bianZhi=naZhi(bianBits);
    const gz=dayGZ(), riG=TG[gz%10], riZ=DIZHI[gz%12], kong=xunKong(gz);
    const lsStart=liushenStart(gz%10);
    const yong=effYong();

    $('rizhen') && ($('rizhen').textContent='日辰:'+riG+riZ+'　旬空:'+kong.join(''));

    // 卦盘表:上爻(6)→初爻(1)
    let rows='';
    for(let p=6;p>=1;p--){
      const y=yaos[p-1];
      const bz=benZhi[p-1], bwx=DZ_WX[bz], lq=liuqin(gongWX,bwx);
      const ls=LIUSHEN[(lsStart+p-1)%6];
      const sy = p===shi?'<span class="shiy">世</span>' : p===ying?'<span class="yy">应</span>':'';
      const yongCls = (yong && lq===yong)?' yong':'';
      let bianCell='';
      if(y.moving){
        const vz=bianZhi[p-1], vwx=DZ_WX[vz], vlq=liuqin(gongWX,vwx);
        bianCell=`<span class="bianc">${vlq} ${vz}${vwx}</span>`;
      }
      rows+=`<tr>
        <td class="liushen">${ls}</td>
        <td class="lq${yongCls}">${lq}</td>
        <td class="zhiwx">${bz}${bwx}</td>
        <td><span class="bar ${y.moving?'mv':''}">${barText(y.yang)}</span> <span class="movecol">${moveSym(y)}</span></td>
        <td>${sy}</td>
        <td>${bianCell}</td>
      </tr>`;
    }
    const table=`<table class="pan">
      <tr><th>六神</th><th>六亲</th><th>纳甲</th><th>卦爻</th><th>世应</th><th>变爻</th></tr>
      ${rows}</table>`;

    // 用神:所在爻 + 对世爻的生克(自动白话)
    let yongLine='';
    if(yong){
      const at=[]; let fp=0;
      for(let p=1;p<=6;p++){ if(liuqin(gongWX,DZ_WX[benZhi[p-1]])===yong){ at.push('第'+p+'爻'); if(!fp)fp=p; } }
      if(fp){
        const uz=benZhi[fp-1], uwx=DZ_WX[uz], sz=benZhi[shi-1], swx=DZ_WX[sz];
        const rel = qType==='婚姻' ? yongToShiLove(uwx,swx) : yongToShiGeneric(uwx,swx);
        const flags=[];
        if(fp===shi) flags.push('用神持世(贴着你/在你手上)');
        if(kong.indexOf(uz)>=0) flags.push('用神逢空(对方心飘/回避,或悬而未决)');
        if(yaos[fp-1].moving) flags.push('用神发动(有变动、主动)');
        const who = qType==='婚姻' ? '对方' : '所问';
        yongLine=`<div class="jie-row">用神(${yong},代表${who}):${at.join('、')}　${uz}${uwx}</div>`+
          `<div class="jie-row" style="color:#d9c9a2">${rel}${flags.length?'<br>· '+flags.join('；'):''}</div>`;
      } else {
        yongLine=`<div class="jie-row">用神(${yong}):本卦不上卦(需看伏神,建议交 AI 断)</div>`;
      }
    }
    const dongList=[];
    for(let p=1;p<=6;p++){ if(yaos[p-1].moving) dongList.push('第'+p+'爻'); }

    const jie=`<div class="jie">
      <div class="jie-title">解卦 · ${qType}</div>
      <div class="jie-row">世爻:<b>第${shi}爻</b>　应爻:<b>第${ying}爻</b>　(世=你/事主,应=对方/远方)</div>
      <div class="jie-row">动爻:<b>${dongList.length?dongList.join('、'):'六爻安静(无动爻)——以本卦及世应断'}</b></div>
      ${yongLine}
      <div class="jie-tip">${YONGSHEN[qType].tip}</div>
    </div>`;

    // 拼可复制提示词
    let lines='';
    for(let p=6;p>=1;p--){
      const y=yaos[p-1], bz=benZhi[p-1], bwx=DZ_WX[bz], lq=liuqin(gongWX,bwx);
      const ls=LIUSHEN[(lsStart+p-1)%6];
      const mk=[]; if(p===shi)mk.push('世'); if(p===ying)mk.push('应'); if(y.moving)mk.push(y.b===3?'动○(阳变阴)':'动×(阴变阳)');
      let ln=`第${p}爻 ${ls} ${lq} ${bz}${bwx} ${y.yang?'阳':'阴'}${mk.length?' 【'+mk.join(' ')+'】':''}`;
      if(y.moving){ const vz=bianZhi[p-1]; ln+=` → 变:${liuqin(gongWX,DZ_WX[vz])}${vz}${DZ_WX[vz]}`; }
      lines+=ln+'\n';
    }
    lastPrompt=
      `我用六爻(摇钱)起了一卦,问的是【${qType}】。下面是完整卦盘。\n\n`+
      `日辰:${riG}${riZ}(旬空:${kong.join('')})\n`+
      `本卦:${ben.name}(${gongWX}宫) —— ${GUAYI[ben.name]||''}\n`+
      `变卦:${bian.name} —— ${GUAYI[bian.name]||''}\n`+
      `世爻:第${shi}爻　应爻:第${ying}爻\n`+
      `用神提示:${YONGSHEN[qType].tip}\n\n`+
      `六爻(自上而下 上爻→初爻):\n${lines}\n`+
      `请分两部分回答:\n\n`+
      `【一、断卦详解(给我自己看)】\n用大白话把这卦讲透:用神取用、旺衰(结合日辰月建)、世应、动爻变爻生克,断吉凶和大致应期。长短不限,讲清楚为主。\n\n`+
      `【二、评论区回复(我直接发给对方的)】\n再写一条【50字以内】的超短回复:口语、像聊天一问一答,直接给个明确倾向(吉/凶、能/不能),但别把道理和来龙去脉说透,留个引子让对方想追问(点到关键不展开,或末尾反问一句)。不用术语、不罗列。`;

    $('result').innerHTML=
      `<div class="ghead">
        <div class="gname">${ben.name} <span class="garrow">→</span> ${bian.name}</div>
        <div class="gmeta">${gongWX}宫　日辰 ${riG}${riZ}　旬空 ${kong.join('')}</div>
        <div class="gyi">本:${GUAYI[ben.name]||''}　｜　变:${GUAYI[bian.name]||''}</div>
      </div>`+
      table + jie +
      `<button class="copybtn" onclick="copyPrompt()">📋 复制断卦提示词 → 粘到 DeepSeek/AI</button>`+
      `<div class="disclaim">本盘仅完成"装卦"(纳甲/六亲/世应/六神/旬空)。真正断卦要取用神、结合月建旺衰与伏神飞神——请顺卦盘自行综合,或交给 AI。仅供参考娱乐。</div>`;
  }
  function copyPrompt(){
    if(!lastPrompt) return;
    const ta=document.createElement('textarea');
    ta.value=lastPrompt; ta.style.position='fixed'; ta.style.top='0'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    let ok=false; try{ ok=document.execCommand('copy'); }catch(e){}
    document.body.removeChild(ta);
    alert(ok?'已复制!打开 DeepSeek 粘贴,让它帮你断卦~':'复制失败,请手动长按选择');
  }

  /* ===== 事件 ===== */
  $('tapBtn').addEventListener('click',()=>{ if(yaos.length>=6) return; yaos.push(shake()); render(); });
  $('autoBtn').addEventListener('click',()=>{ yaos=[]; for(let i=0;i<6;i++) yaos.push(shake()); render(); });
  $('resetBtn').addEventListener('click',()=>{ yaos=[]; render(); });

  function buildTypes(){
    $('types').innerHTML=Object.keys(YONGSHEN).map(t=>`<button class="${t===qType?'on':''}" data-t="${t}">${t}</button>`).join('');
    $('types').querySelectorAll('button').forEach(b=> b.onclick=()=>{ qType=b.dataset.t; buildTypes(); updateGender(); if(yaos.length>=6) showResult(); });
  }
  function updateGender(){
    $('gender').style.display = qType==='婚姻' ? 'flex' : 'none';
    $('gender').querySelectorAll('button').forEach(b=> b.classList.toggle('on', b.dataset.g===gender));
  }
  $('gender').querySelectorAll('button').forEach(b=> b.onclick=()=>{ gender=b.dataset.g; updateGender(); if(yaos.length>=6) showResult(); });
  buildTypes();
  updateGender();
  render();
</script>
</body>
</html>
